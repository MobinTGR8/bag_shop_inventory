name: bag_shop_inventory
description: A professional inventory management system for bag shops
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.1.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.20.4
  
  # Navigation
  go_router: ^12.1.1
  
  # UI Components
  gap: ^3.0.1
  badges: ^3.0.1
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  syncfusion_flutter_datagrid: ^23.1.43
  syncfusion_flutter_charts: ^23.1.43
  
  # Barcode/QR
  mobile_scanner: ^3.4.0
  qr_flutter: ^4.0.0
  
  # Forms & Validation
  reactive_forms: ^16.0.0
  
  # Local Storage
  # (Disabled) Isar removed for SDK compatibility
  shared_preferences: ^2.2.2
  
  # File Handling
  image_picker: ^1.0.4
  image_cropper: ^11.0.0
  cached_network_image: ^3.3.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Utilities
  intl: ^0.18.1
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.1
  share_plus: ^7.2.2
  connectivity_plus: ^5.0.1
  printing: ^5.11.1
  pdf: ^3.10.2
  uuid: ^4.2.0
  equatable: ^2.0.5
  
  # Fonts
  google_fonts: ^6.1.0
  
  # Icons
  material_design_icons_flutter: ^7.0.0
  font_awesome_flutter: ^10.5.0
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  analyzer: ^5.13.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.8
  flutter_launcher_icons: ^0.13.1
  image: ^4.0.17

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env
    - env.json

flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#183C8F"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
