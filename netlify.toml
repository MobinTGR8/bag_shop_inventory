# Netlify deployment configuration for Flutter web app
[build]
  # Flutter web outputs to build/web by default
  publish = "build/web"
  # Pass Supabase credentials via --dart-define so the app works without .env on web
  # Set SUPABASE_URL and SUPABASE_ANON_KEY in Netlify Dashboard → Environment variables
  command = """
    flutter build web --release \
      --dart-define=SUPABASE_URL=$SUPABASE_URL \
      --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
  """

# SPA redirect: serve index.html for all routes so Flutter's router handles navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for Flutter's generated assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets (images, fonts) aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
